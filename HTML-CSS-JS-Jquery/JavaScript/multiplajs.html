<html>
<head>
<title>value getting in js</title>

<script>

function multi()
{
//window.alert("Hello!!");
var a=document.getElementById("x").value; 
//window.alert(a);
var b=document.getElementById("y").value;
var muti=(a*b);
//window.alert(div);
document.write("mutlipale = "+multi);
}
</script> 
</head>
<body>

Enter First Number: <input type="text" id="x"/>
<br/>

Enter Second Number: <input type="text" id="y"/>

<input type="button" value="mutlipale" onclick="multi()"/>

</body>
</html>
