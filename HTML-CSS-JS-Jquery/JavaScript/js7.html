<html>
<head>
<script>
	function table()
	{
	var n=Number(document.getElementById("t1").value);
	var res="";
	for(i=1;i<=10;i++)
	{
	res+=n+"*"+i+" ="+(n*i)+"<br>";
	}
	document.getElementById("sp").innerHTML=res;
	}
	
</script>
</head>
<body>
Enter a number:
<input type="number" id="t1"/>
<input type="button" value="print table" onclick="table()"/>
<br>
<span id="sp"></span>
</body>
</html>
