<html>
<head>
<script>
	function calc(btn)
	{
	//alert(btn)
	var result="";
	var a=Number(document.getElementById("t1").value);
	var b=Number(document.getElementById("t2").value);
	switch(btn)
	{
	case "+":
	result="sum = "+(a+b);
	break;
	case "-":
	result="sub = "+(a-b);
	break;
	case "*":
	result="mult = "+(a*b);
	break;
	default:
	result="div = "+(a/b);
	}
	document.getElementById("sp").innerHTML=result;
	}
</script>
</head>
<body>
First No:<input type="text" id="t1"/>
<br>
Second No:<input type="text" id="t2"/>
<br>
<input type="button" value="+" onclick="calc(this.value)"/>
<br>
<input type="button" value="-"onclick="calc(this.value)"/>
<br>
<input type="button" value="*"onclick="calc(this.value)"/>
<br>
<input type="button" value="/"onclick="calc(this.value)"/>
<br>
<span id="sp"></span>
</body>
</html>
