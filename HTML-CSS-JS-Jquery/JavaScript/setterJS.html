<html>
<head>
<title>value setter in js</title>

<script>

function sub()
{
//window.alert("Hello!!");
var a=document.getElementById("x").value;
//window.alert(a);
var b=document.getElementById("y").value;
//window.alert(b);
var sub=(a-b);
//window.alert(sub);
//document.write("Subtraction = "+sub);

document.getElementById("res").innerHTML=sub;	//we are assigning the value of 'sub' to 'res'
}

</script>
 
</head>
<body>

Enter First Number: <input type="text" id="x"/><br/>

Enter Second Number: <input type="text" id="y"/><br/>

<input type="button" value="Subtraction" onclick="sub()"/>
<br/>
Result: <span id="res">		</span>

</body>
</html>
