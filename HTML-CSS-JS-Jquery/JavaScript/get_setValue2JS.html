<html>
<head>
	<title>innerHTML Concept to get & set Value</title>
	<script>
	function getmgs()
	{
	var value=document.getElementById("txt").innerHTML;
	window.alert(value);
	document.getElementById("result").innerHTML=value;
	}
	</script>
</head>

<body>

	<h1 id="txt"><i>Java Script</i></h1>
	<br>
	<input type="button" value="click Me" onclick="getmgs()"/>
	<br>
	<p id="result"></p>

</body>
</html>
