<html>
<head>
	<title>For Loop in JS</title>
	<script>
	function printNum()
	{
	 var i;
	 var res="";
	 for(i=1;i<=10;i++)
	 {
	  res=res+i+"<br/>";
	 }
	 document.getElementById("printNumbers").innerHTML=res;
	}
	</script>
</head>

<body>

	<input type="button" value="Print the Number 1-10" onclick="printNum()"/><br/>
	<span id="printNumbers"></span>

</body>
</html>
