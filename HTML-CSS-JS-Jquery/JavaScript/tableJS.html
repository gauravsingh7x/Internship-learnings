<html>
<head>
	<title>Print the Table of Given Number in JS</title>
	<script>
	function table()
	{
	var t=Number(document.getElementById("num").value);
	var tab="";
	for(i=1;i<=10;i++)
	{
	 tab+=t+"*"+i+" ="+(t*i)+"<br>";
	}
	document.getElementById("table").innerHTML=tab;
	}
	</script>
</head>
<body>
Enter a number:
<input type="number" id="num"/>
<input type="button" value="print table" onclick="table()"/>
<br>
<span id="table"></span>
</body>
</html>
