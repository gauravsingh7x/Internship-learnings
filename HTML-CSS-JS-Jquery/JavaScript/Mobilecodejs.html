<html>
<head>
<script>
	function validate()
	{
	var p=document.getElementById("mobilenumber").value;
	var reg=/^[6-9]{1}[0-9]{9}$/;
	if(reg.test(p))
	{
	document.getElementById("sp").innerHTML="Valid Mobile Number";
	document.getElementById("sp").style.color="green";
	}
	else
	{
	document.getElementById("sp").innerHTML="Invalid Mobile Number";
	document.getElementById("sp").style.color="red";
	}
	}
</script>
</head>
<body>
Enter Mobile Number:
<input type="number" id="mobilenumber"/>
<input type="button" value="click" onclick="validate()"/>
<br>
<span id="sp"></span>

</body>
</html>
