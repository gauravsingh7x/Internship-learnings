<html>
<head>
	<title>Check the Even or Odd</title>
	<script>
	function evenOdd()
	{
	var num=Number(document.getElementById("n").value);
	 if(num%2==0)
	 {
	 window.alert("Given number is even: "+num);
	 }
	 else
	 {
	 window.alert("Given number is odd: "+num);
	 }
	 }
	</script>
</head>

<body>

Enter the Number: <input type="number" id="n"/>
<input type="button" value="Even or odd" onclick="evenOdd()"/>

</body>
<html>
