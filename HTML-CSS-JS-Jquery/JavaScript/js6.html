<html>
<head>
<script>
	function printnum()
	{
	var i;
	var res="";
	for(i=1;i<10;i++)
	{
	res=res+i+"<br>";
	}
	document.getElementById("result").innerHTML=res;
	}			
</script>
</head>
<body>

<input type="button" value="print Number 1 to 10" onclick="printnum()"/>
<br>
<span id="result"></span>

</body>
</html>
