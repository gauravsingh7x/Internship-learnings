<html>
<head>
<script>
	function validate()
	{
	var p=document.getElementById("pincode").value;
	var reg=/^[0-9]{6}$/;
	if(reg.test(p))
	{
	document.getElementById("sp").innerHTML="Valid Pin Code";
	document.getElementById("sp").style.color="green";
	}
	else
	{
	document.getElementById("sp").innerHTML="Invalid Pin Code";
	document.getElementById("sp").style.color="red";
	}
	}
</script>
</head>
<body>
Enter Pic Code:
<input type="number" id="pincode"/>
<input type="button" value="click" onclick="validate()"/>
<br>
<span id="sp"></span>

</body>
</html>
