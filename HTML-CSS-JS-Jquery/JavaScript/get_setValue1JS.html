<html>
<head>
	<title>Getter & Setter</title>
	<script>
	function getText()
	{
	var num=document.getElementById("get").value;	// getter
	//alert(v);
	document.getElementById("set").value=num;	//setter
	document.getElementById("get").value="";
	}
	</script>
</head>

<body>
	Enter the Text: <input type="text" id="get"/>
	<br>
	<input type="button" value="Get Value & Set Down" onclick="getText()"/>
	<br>
	Display Output: <input type="text" id="set"/>
</body>
</html>
