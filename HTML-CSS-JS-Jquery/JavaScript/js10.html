<html>
<head>
<script>
	function showdiv()
	{
	document.getElementById("d1").style.display="block";
	}

function hidediv()
		{
		document.getElementById("d1").style.display="none";
		}
		function setcolor(c)
		{
		document.getElementById("d1").style.backgroundColor=c;
		}

</script>
</head>
<body>
	<div id="d1" style="height:200px;width:200px; background-color:red;"></div>
	<input type="button" value="show"  onclick="showdiv()"/>
	<input type="button" value="hide"  onclick="hidediv()"/>
	<br/>
	<select onchange="setcolor(this.value)">
	<option value="">Select Color</option>
	<option value="red">Red</option>
	<option value="yellow">yellow</option>
	<option value="green">green</option>
	<option value="aqua">aqua</option>
	<option value="black">black</option>
	</select>
</body>
</html>
