<html>
<head>
<script>
function evenodd()
{
 var num=Number(document.getElementById("txt1").value);
 if(num%2==0)
 {
 alert("Entered number is even:"+num);
 }
 else
 {
 alert("Entered number is odd:"+num);
 }
}
</script>
</head>
<body>
Enter any Number:
<input type="number" id="txt1"/>
<input type="button" value="Even or odd" onclick="evenodd()"/>
</body>
