<html>
<head>
<script>
function great()
{
//window.alert("Check");
var num1=document.getElementById("f").value;
//window.alert(num1);
var num2=document.getElementById("s").value;
//window.alert(num2);
if(num1>num2)
{
//window.alert("First Number is Greatest Number "+num1);

}
else
{

}
}
</script>
</head>
<body>

Enter First No.

Enter Second No. 
<input type="text" id="s"/><br/>
<input type="button" value="Find the Greatest" onclick="great()"/>
