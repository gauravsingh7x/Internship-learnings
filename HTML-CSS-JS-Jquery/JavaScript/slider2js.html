<html>
<head>
<script>

	var imgarr=["1.jpg", "2.jpg", "3.jpg", "4.jpg"];
	var i=0;
	function slider()
	{
	document.getElementById("d1").style.backgroundImage="url(img/"+imgarr[i]+")";
	i++;
	if(i==imgarr.length)
	{
	i=0;
	}
	window.setTimeout("slider()",2000);
	}

</script>
</head>
<body onload="slider()">

<div id="d1" style="height:250px;width:1000px;margin:0px auto;"></div>

</body>
</html>
