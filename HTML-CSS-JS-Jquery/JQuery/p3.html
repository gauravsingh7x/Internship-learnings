<html>
	<head>
<script src="jquery-3.5.1.min.js" ></script>
	<script>
		$(document).ready(function(){
			//alert("check");
		
			$("#btn").click(function(){
				//alert("check");
				var v=$("#t1").val();// get
				//alert(v);
				$("#result").val(v);// set
				$("#t1").val("");
	
			});
		
		});

		
	</script>
	</head>
	<body>
	Enter Value :
	<input type="text" id="t1"/>
	<input type="button" id="btn" value="Click Me"/>
	<br>
	Result :
	<input type="text" id="result"/>
	</body>
</html>
