<html>
<head>
<script src="jquery-3.5.1.min.js" ></script>	
<script>
$(document).ready(function(){
$("#btn").click(function(){
var button=$(this).val();
if(button=="show")
{
$("#pass").attr("type","text");
$(this).val("hide");
}
else
{
$("#pass").attr("type","password");
$(this).val("show");
}


});

});
</script>
</head>
<body>
Enter Password :
<input type="password" id="pass"/>
<input type="button" id="btn" value="show"/>
<br>

<span id="sp"></span>
</body>
</html>
